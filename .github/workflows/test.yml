name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

# 2026-06-02 부터 Node.js 20 기반 액션이 자동으로 Node 24 로 승격된다.
# 최신 메이저 버전(checkout@v5, setup-python@v6, setup-uv@v7) 은 이미 Node 24
# 을 지원하므로 미리 pin 해 두면 deprecation 경고/중단 리스크가 없다.

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    # 일부 "unit" 테스트가 실제 DB 접근 — 단순성을 위해 postgres/redis 서비스 함께 기동.
    # 장기적으로는 DB 의존 테스트를 tests/integration/ 으로 이동 필요.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mcpdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/mcpdb_test
      ADMIN_USER: admin
      ADMIN_PASSWORD: TestPassword123!
      EMBEDDING_PROVIDER: local
      EMBEDDING_DIM: 384
      MCPER_AUTH_ENABLED: "false"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.12"

      - name: Install dependencies
        run: |
          uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system -r requirements.txt pytest pytest-asyncio httpx

      - name: Run unit tests
        # `pythonpath = ["."]` 는 pyproject.toml 에서 설정.
        run: pytest tests/unit/ -v --tb=short

  integration-tests:
    name: Integration tests (postgres + redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mcpdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/mcpdb_test
      ADMIN_USER: admin
      ADMIN_PASSWORD: TestPassword123!
      EMBEDDING_PROVIDER: local
      EMBEDDING_DIM: 384
      MCPER_AUTH_ENABLED: "false"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.12"

      - name: Install dependencies
        run: |
          uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system -r requirements.txt pytest pytest-asyncio httpx

      - name: Run integration-marked unit tests + tests/integration/
        # 기본 addopts 가 integration 을 제외하므로 명시적으로 override.
        run: |
          pytest tests/unit/ -m integration -v --tb=short
          if [ -d tests/integration ] && [ -n "$(find tests/integration -name 'test_*.py' -print -quit)" ]; then
            pytest tests/integration/ -v --tb=short -m ""
          else
            echo "tests/integration 비어있음 — skip"
          fi
