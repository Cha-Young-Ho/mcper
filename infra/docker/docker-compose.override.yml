# infra/docker/docker-compose.override.yml
# 개발용 오버라이드 — 핫리로드 + 디버그 로그
# docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.override.yml up
# (같은 디렉터리에서 up 시 자동 병합)
#
# 로컬 개발에서는 모든 포트를 0.0.0.0에 바인딩해 접근 편의성 제공
# 프로덕션에서는 docker-compose.yml의 MCPER_HOST_BIND=127.0.0.1 사용

services:
  web:
    volumes:
      - ../..:/app               # 소스 코드 핫리로드용 마운트
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    environment:
      - WATCHFILES_FORCE_POLLING=1   # Docker Desktop 파일 감지용
      - MCPER_ADMIN_ENABLED=true
      - MCP_BYPASS_TRANSPORT_GATE=true
      - LOG_FORMAT=text
      - LOG_LEVEL=DEBUG

  worker:
    volumes:
      - ../..:/app
