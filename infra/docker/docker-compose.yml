# infra/docker/docker-compose.yml
#
# ┌──────────────┬────────────────────────────────────────────────────────────────────────────────────┐
# │ 환경         │ 명령어 (infra/docker/ 디렉터리에서 실행)                                             │
# ├──────────────┼────────────────────────────────────────────────────────────────────────────────────┤
# │ 로컬 개발    │ docker compose up                                                                  │
# │ 환경 지정    │ COMPOSE_ENV_FILE=.env.staging docker compose up                                   │
# │ 테스트       │ docker compose -f docker-compose.test.yml up --build --abort-on-container-exit    │
# │              │   --exit-code-from test                                                            │
# └──────────────┴────────────────────────────────────────────────────────────────────────────────────┘
#
# env 파일 우선순위 (낮음 → 높음, 뒤쪽이 앞쪽을 덮어씀):
#   1. .env.example — 커밋된 기본값 (항상 존재, 클론 직후 바로 실행 가능)
#   2. .env.local   — 로컬/서버 오버라이드 (커밋 가능, 민감 정보만 별도 관리)
#   3. COMPOSE_ENV_FILE — 환경 지정 시 전체 교체 (예: COMPOSE_ENV_FILE=.env.prod)
name: spec-mcp

services:
  web:
    image: spec-mcp:local
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${MCPER_WEB_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: .env.example
        required: true
      - path: ${COMPOSE_ENV_FILE:-.env.local}
        required: false
    volumes:
      - ../..:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      ${UVICORN_EXTRA_OPTS:-}
    environment:
      - MCPER_ADMIN_ENABLED=${MCPER_ADMIN_ENABLED:-true}
      - MCPER_MCP_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: spec-mcp:local
    # -E: task events 활성화 → Celery Inspect(active/reserved) 정상 작동
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info --concurrency=2 -E
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: .env.example
        required: true
      - path: ${COMPOSE_ENV_FILE:-.env.local}
        required: false
    volumes:
      - ../..:/app
    restart: unless-stopped
    # sentence-transformers + torch 로드 시 ~500MB 이상 사용 가능
    # 프로덕션에서 OOM 방지를 위해 상한 설정
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mcpdb}
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-mcpdb}"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Phase 3 (L06): PgBouncer 커넥션 풀러.
  # 기본 기동에서 제외(profile: pgbouncer). 활성화: docker compose --profile pgbouncer up -d pgbouncer
  # 시작은 session 모드(안전). transaction 모드는 설계 문서 참고 후 별도 전환.
  # 설계: docs/design-docs/pgbouncer-setup.md
  pgbouncer:
    profiles: ["pgbouncer"]
    image: edoburu/pgbouncer:v1.23.1-p3
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 연결 대상 Postgres (compose 내부 네트워크)
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-mcpdb}
      # session 으로 시작(안전). 환경변수로 transaction 전환 가능.
      - POOL_MODE=${PGBOUNCER_POOL_MODE:-session}
      - MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-200}
      - DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      - MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE:-5}
      - RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-5}
      - SERVER_RESET_QUERY=DISCARD ALL
      - AUTH_TYPE=md5
    # 호스트 노출은 선택 사항(디버그용). 기본은 내부 네트워크에서만 접근.
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${PGBOUNCER_HOST_PORT:-6433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USER:-user} -d ${DB_NAME:-mcpdb}"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    # RDB(60s) + AOF(everysec): 재시작 시 파일 스테이징 데이터 복구 가능
    # everysec = 최대 1초 유실, always 대비 I/O 부담 낮음
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    restart: unless-stopped

  # Optional: 로컬 임베딩 실험용 (--profile local-embed)
  ollama:
    profiles:
      - local-embed
    image: ollama/ollama:0.6.5
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Phase 3 (C안): sentence-transformers 를 별도 컨테이너로 격리.
  # 각 웹 인스턴스가 500MB 모델을 중복 로드하던 문제 해결 → 384d 유지 (pgvector/HNSW 호환).
  # 선택 기동: docker compose --profile sidecar-embed up -d embed
  # 본체에서 EMBEDDING_PROVIDER=sidecar + EMBEDDING_SIDECAR_URL=http://embed:8000 으로 사용.
  embed:
    profiles:
      - sidecar-embed
    build:
      context: embed-sidecar
      dockerfile: Dockerfile
    image: spec-mcp-embed:local
    environment:
      - EMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - EMBED_NORMALIZE=true
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${EMBED_SIDECAR_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ollama_data:
