# infra/docker/docker-compose.yml
#
# ┌──────────────┬────────────────────────────────────────────────────────────────────────────────────┐
# │ 환경         │ 명령어 (infra/docker/ 디렉터리에서 실행)                                             │
# ├──────────────┼────────────────────────────────────────────────────────────────────────────────────┤
# │ 로컬 개발    │ docker compose up                                                                  │
# │ 환경 지정    │ COMPOSE_ENV_FILE=.env.staging docker compose up                                   │
# │ 테스트       │ docker compose -f docker-compose.test.yml up --build --abort-on-container-exit    │
# │              │   --exit-code-from test                                                            │
# └──────────────┴────────────────────────────────────────────────────────────────────────────────────┘
#
# env 파일 목록:
#   .env.local   — 로컬 개발 기본값 (기본값, gitignore)
#   .env.example — 프로덕션용 템플릿 (cp .env.example .env.prod 후 사용)
name: spec-mcp

services:
  web:
    image: spec-mcp:local
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${MCPER_WEB_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: ${COMPOSE_ENV_FILE:-.env.local}
        required: true
    volumes:
      - ../..:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      ${UVICORN_EXTRA_OPTS:-}
    environment:
      - MCPER_ADMIN_ENABLED=${MCPER_ADMIN_ENABLED:-true}
      - MCPER_MCP_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: spec-mcp:local
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: ${COMPOSE_ENV_FILE:-.env.local}
        required: true
    volumes:
      - ../..:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mcpdb}
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-mcpdb}"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped

  # Optional: 로컬 임베딩 실험용 (--profile local-embed)
  ollama:
    profiles:
      - local-embed
    image: ollama/ollama:0.6.5
    ports:
      - "${MCPER_HOST_BIND:-127.0.0.1}:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  redisdata:
  ollama_data:
