<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCP 인증 — MCPER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/admin/admin.css?v=3" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg, #f8f9fb); }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px 0 rgba(0,0,0,.06);
    }
    .login-brand { text-align: center; margin-bottom: 1.5rem; }
    .login-brand h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.5px; margin: 0; }
    .login-brand small { color: #6b7280; font-size: .8rem; }
    .mcp-info {
      background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 8px;
      padding: .75rem 1rem; margin-bottom: 1.25rem; font-size: .85rem; color: #3730a3;
    }
    .mcp-info strong { font-weight: 600; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .4rem; color: #374151; }
    .form-group input {
      width: 100%; box-sizing: border-box;
      padding: .6rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .btn-primary {
      width: 100%; padding: .7rem; background: #6366f1; color: #fff;
      border: none; border-radius: 8px; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .error-msg { color: #dc2626; font-size: .85rem; margin-bottom: 1rem; padding: .5rem .75rem; background: #fef2f2; border-radius: 6px; border: 1px solid #fecaca; }
    .success-msg {
      text-align: center; padding: 2rem 1rem;
    }
    .success-msg .check { font-size: 3rem; margin-bottom: .5rem; }
    .success-msg h2 { font-size: 1.1rem; font-weight: 600; margin: 0 0 .5rem; color: #059669; }
    .success-msg p { font-size: .85rem; color: #6b7280; margin: 0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1>MCPER</h1>
      <small>MCP Server Authentication</small>
    </div>

    <div class="mcp-info">
      <strong>MCP 클라이언트</strong>가 인증을 요청했습니다.<br/>
      로그인하면 MCP 도구 접근 토큰이 자동으로 발급됩니다.
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/mcp-authorize">
      <input type="hidden" name="request_id" value="{{ request_id }}" />
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" placeholder="admin" autofocus required />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button type="submit" class="btn-primary">인증 허용</button>
    </form>
  </div>
</body>
</html>
