{% extends "admin/base.html" %}
{% block body %}
<p class="muted" style="margin-top:0"><a href="/admin/users">&larr; 유저 목록</a></p>

{% if error %}
<div class="alert alert--danger" style="margin-bottom:1rem;padding:.75rem 1rem;border:1px solid var(--clr-danger,red);border-radius:6px;color:var(--clr-danger,red)">
  {{ error }}
</div>
{% endif %}

<form method="post" action="{% if mode == 'create' %}/admin/users/new{% else %}/admin/users/{{ user_obj.id }}/edit{% endif %}"
      style="max-width:420px">
  <div style="display:grid;grid-template-columns:120px 1fr;gap:.5rem 1rem">
    <label for="username">사용자명</label>
    {% if mode == 'create' %}
    <input id="username" name="username" class="input" required
           value="{{ request.query_params.get('username', '') }}" />
    {% else %}
    <span><strong>{{ user_obj.username }}</strong></span>
    {% endif %}

    <label for="email">이메일</label>
    <input id="email" name="email" class="input" type="email" placeholder="(선택)"
           value="{{ user_obj.email or '' if user_obj else '' }}" />

    <label for="password">비밀번호</label>
    <input id="password" name="password" class="input" type="password"
           {% if mode == 'create' %}required{% endif %}
           placeholder="{% if mode == 'edit' %}변경 시 입력{% endif %}"
           autocomplete="new-password" />

    <label for="is_admin">관리자</label>
    <label><input id="is_admin" name="is_admin" type="checkbox"
                  {% if user_obj and user_obj.is_admin %}checked{% endif %} /> admin</label>
  </div>
  <div style="margin-top:1.25rem;display:flex;gap:.5rem">
    <button type="submit" class="btn btn-primary">{% if mode == 'create' %}생성{% else %}저장{% endif %}</button>
    <a href="/admin/users" class="btn btn-ghost">취소</a>
  </div>
</form>
{% endblock %}
