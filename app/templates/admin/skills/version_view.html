{% extends "admin/base.html" %}
{% block head %}
<link rel="stylesheet" href="/static/admin/markdown-split.css?v=3" />
{% endblock %}
{% block body %}
<p class="muted" style="margin-top:0">
  <a href="{{ back_url }}">← {{ back_label }}</a>
  &nbsp;/&nbsp; v{{ row.version }}
</p>

<div class="version-meta" style="margin-bottom:1rem">
  <span class="category-badge">{{ section_display }}</span>
  <span class="ver-badge">v{{ row.version }}</span>
  <time class="muted">{{ row.created_at }}</time>
</div>

<div class="split-editor split-editor--view-mode">
  <div class="split-editor__pane">
    <label class="form-label">원문 (Markdown)</label>
    <pre class="code-block">{{ row.body }}</pre>
  </div>
  <div class="split-editor__pane split-editor__preview-pane">
    <label class="form-label">렌더링</label>
    <div id="preview" class="split-editor__preview markdown-body"></div>
  </div>
</div>

<hr style="margin:2rem 0" />

<div class="page-actions page-actions--spread">
  <form method="post" action="{{ save_as_new_url }}"
        onsubmit="document.querySelector('#edit-body').value = document.querySelector('.code-block').textContent">
    <input type="hidden" id="edit-body" name="body" value="{{ row.body | e }}" />
    <button type="submit" class="btn btn-primary">새 버전으로 저장</button>
  </form>

  {% if can_delete_version %}
  <form method="post" action="{{ delete_version_url }}"
        onsubmit="return confirm('버전 {{ row.version }}을 삭제할까요?');">
    <button type="submit" class="btn btn-danger">이 버전 삭제</button>
  </form>
  {% endif %}
</div>

<script>
(function () {
  const body = {{ row.body | tojson }};
  const preview = document.getElementById('preview');
  if (typeof marked !== 'undefined') {
    preview.innerHTML = marked.parse(body);
  } else {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    script.onload = () => { preview.innerHTML = marked.parse(body); };
    document.head.appendChild(script);
  }
})();
</script>
{% endblock %}
