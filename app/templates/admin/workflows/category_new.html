{% extends "admin/base.html" %}
{% block head %}
<link rel="stylesheet" href="/static/admin/markdown-split.css?v=3" />
{% endblock %}
{% block body %}
<p class="muted" style="margin-top:0"><a href="{{ cancel_url }}">← 돌아가기</a></p>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form id="category-form" method="post" action="{{ form_action }}">
  <div class="form-group" style="max-width:400px; margin-bottom:1.5rem">
    <label class="form-label" for="section_name">
      카테고리 이름
      <small class="muted">(영문·숫자·_-, 기존 카테고리: {{ existing_sections | join(', ') }})</small>
    </label>
    <input type="text" id="section_name" name="section_name"
           class="input" required autocomplete="off"
           placeholder="예: architecture, db_rules, api_context" />
  </div>

  <div class="split-editor" style="margin-bottom:1.5rem">
    <div class="split-editor__pane">
      <label class="form-label">내용 (Markdown)</label>
      <textarea id="body" name="body" class="input split-editor__source"
                placeholder="이 카테고리 전용 워크플로우/시스템 이해를 입력하세요."
                spellcheck="false"></textarea>
    </div>
    <div class="split-editor__pane split-editor__preview-pane">
      <label class="form-label">미리보기</label>
      <div id="preview" class="split-editor__preview markdown-body"></div>
    </div>
  </div>

  <div class="page-actions">
    <button type="submit" class="btn btn-primary">저장</button>
    <a href="{{ cancel_url }}" class="btn btn-secondary">취소</a>
  </div>
</form>

<script>
(function () {
  const form = document.getElementById('category-form');
  const sectionInput = document.getElementById('section_name');
  const existing = {{ existing_sections | tojson }};

  form.addEventListener('submit', function (e) {
    const sn = sectionInput.value.trim().toLowerCase();
    if (existing.map(x => x.toLowerCase()).includes(sn)) {
      e.preventDefault();
      alert(`카테고리 '${sn}'이 이미 존재합니다. 다른 이름을 사용하세요.`);
    }
  });
})();
</script>

<script src="/static/admin/markdown-preview.js?v=3"></script>
{% endblock %}
