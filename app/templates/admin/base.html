<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>{{ title }} — MCPER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/admin/admin.css?v=3" />
  {% block head %}{% endblock %}
</head>
<body>
  <div class="admin-layout" id="admin-layout">
    <aside class="admin-sidebar" aria-label="주 메뉴">
      <div class="admin-sidebar__brand">
        <a href="/admin">MCPER</a>
        <small>기획서 · 룰 · Tools</small>
      </div>
      <nav class="admin-nav">
        <a href="/admin" class="nav-link" data-nav="home"><span class="admin-nav__icon" aria-hidden="true">⌂</span> 대시보드</a>
        <a href="/admin/plans" class="nav-link" data-nav="plans"><span class="admin-nav__icon" aria-hidden="true">📄</span> 기획서</a>
        <a href="/admin/plans/bulk-upload" class="nav-link" data-nav="bulk-upload"><span class="admin-nav__icon" aria-hidden="true">↑</span> 일괄 업로드</a>
        <a href="/admin/plan-code" class="nav-link" data-nav="plan-code"><span class="admin-nav__icon" aria-hidden="true">🔗</span> 기획서–코드</a>
        <details class="admin-nav-group" data-nav-rules-group>
          <summary class="admin-nav-group__summary"><span class="admin-nav__icon" aria-hidden="true">◇</span> Rules</summary>
          <div class="admin-nav-group__sub">
            <a href="/admin/global-rules" class="nav-link nav-link--sub" data-nav="global-rules">Global rules</a>
            <a href="/admin/repo-rules" class="nav-link nav-link--sub" data-nav="repo-rules">Repository rules</a>
            <a href="/admin/app-rules" class="nav-link nav-link--sub" data-nav="app-rules">Apps rules</a>
          </div>
        </details>
        <a href="/admin/tools" class="nav-link" data-nav="tools"><span class="admin-nav__icon" aria-hidden="true">⚙</span> Tools</a>
        <a href="/admin/celery" class="nav-link" data-nav="celery"><span class="admin-nav__icon" aria-hidden="true">⏱</span> Celery</a>
        <a href="/admin/seed/confirm" class="nav-link" data-nav="seed"><span class="admin-nav__icon" aria-hidden="true">↻</span> 재시드</a>
      </nav>
      <div class="admin-sidebar__foot">
        <a href="/health" target="_blank" rel="noopener">/health ↗</a>
      </div>
    </aside>

    <div class="admin-backdrop" data-nav-backdrop aria-hidden="true"></div>

    <div class="admin-main">
      <header class="admin-topbar">
        <button type="button" class="nav-toggle" data-nav-toggle aria-label="메뉴 열기" aria-expanded="false">☰</button>
        <h1 class="admin-page-title">{{ title }}</h1>
      </header>

      <div class="admin-content">
        <div class="card">
          {% block body %}{% endblock %}
        </div>
      </div>
    </div>
  </div>
  <script src="/static/admin/admin.js?v=3" defer></script>
  <script>
  // 모든 폼 제출을 fetch()로 가로채 X-CSRF-Token 헤더 전송
  // — body를 서버 미들웨어에서 소비하지 않아도 되며, multipart 업로드도 안전하게 처리
  (function () {
    function getCsrfToken() {
      return document.cookie.split('; ').reduce(function (acc, part) {
        var kv = part.split('=');
        return kv[0].trim() === 'csrf_token' ? decodeURIComponent(kv[1]) : acc;
      }, '');
    }

    document.addEventListener('submit', function (e) {
      var form = e.target;
      if (!(form instanceof HTMLFormElement)) return;
      var token = getCsrfToken();
      if (!token) return;

      e.preventDefault();

      var url = form.action || window.location.href;
      var method = (form.getAttribute('method') || 'POST').toUpperCase();

      fetch(url, {
        method: method,
        headers: { 'x-csrf-token': token },
        body: new FormData(form),
        credentials: 'include',
      }).then(function (res) {
        if (res.redirected) {
          window.location.href = res.url;
          return;
        }
        return res.text().then(function (html) {
          document.open();
          document.write(html);
          document.close();
          if (res.url && res.url !== window.location.href) {
            window.history.pushState({}, '', res.url);
          }
        });
      }).catch(function (err) {
        console.error('[CSRF] fetch 제출 실패:', err);
      });
    }, true);
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
