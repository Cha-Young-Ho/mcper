{% extends "admin/base.html" %}
{% block body %}
<p class="muted" style="margin-top:0"><a href="/admin/repo-rules">← 패턴 목록</a></p>
{% if error %}<div class="alert alert--error">{{ error }}</div>{% endif %}
<form class="form-stack" method="post" action="/admin/repo-rules/new">
  <div class="field">
    <label class="field-label" for="pattern">pattern</label>
    <input class="input" id="pattern" name="pattern" required placeholder="api 또는 web (origin URL 부분문자열)" autocomplete="off" />
    <p class="field-hint">빈 패턴은 «폴백»용으로 <a href="/admin/repo-rules/pat/__default__">기존 __default__ 스트림</a>에서 관리하세요.</p>
  </div>
  <div class="field">
    <label class="field-label" for="sort_order">sort_order</label>
    <input class="input" id="sort_order" name="sort_order" type="number" value="100" />
    <p class="field-hint">숫자가 작을수록 URL에 여러 패턴이 동시에 맞을 때 우선합니다.</p>
  </div>
  <div class="field">
    <label class="field-label" for="body">첫 버전 본문 (Markdown)</label>
    <textarea class="input" id="body" name="body" required rows="16"></textarea>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">버전 1로 저장</button>
    <a href="/admin/repo-rules" class="btn btn-secondary">취소</a>
  </div>
</form>
{% endblock %}
