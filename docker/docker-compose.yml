name: spec-mcp

# 빌드 팁: 코드만 바꿀 땐 --build 없이 up (볼륨 + reload). requirements/Dockerfile 바뀐 뒤만 build.
# web 과 worker 는 동일 image 태그 → 이미지 빌드·export 가 한 번만 (이전: web/worker 각각 export).

services:
  web:
    image: spec-mcp:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # MCP Host/Origin 앱 검사 끔 → SG·ALB에서만 제어. 끄려면 0 또는 unset.
      - MCP_BYPASS_TRANSPORT_GATE=1
      # MCP 허용 Host: 웹 기동 시 env(MCP_ALLOWED_HOSTS, EC2 IMDS 퍼블릭 IP 등)로 DB 자동 INSERT — 어드민 수동 등록 없음.
      # 선택: config.yaml 마운트 시 MCPER_CONFIG=/app/config.yaml
      # Origins 가 필요하면 MCP_ALLOWED_ORIGINS=http://공인IP:8001 또는 config.yaml security.allowed_origins
      - DATABASE_URL=postgresql://user:password@db:5432/mcpdb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - EMBEDDING_DIM=384
      # - LOCAL_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=changeme
      - WATCHFILES_FORCE_POLLING=1

  worker:
    image: spec-mcp:local
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mcpdb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - EMBEDDING_DIM=384

  redis:
    image: redis:7-alpine
    # 호스트에 redis가 있으면 6379 충돌 방지
    ports:
      - "6380:6379"

  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mcpdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mcpdb"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Optional: 로컬 전용 임베딩/LLM 실험 (호스트 설치 대신 Docker만 사용)
  ollama:
    profiles:
      - local-embed
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
