# MCPER 부트스트랩 예시.
#
# ┌─ 어떤 파일을 쓰나 ─────────────────────────────────────────────────────────
# 1) 명시 경로 (병합 없음, 이 파일 하나만)
#    export MCPER_CONFIG=/path/to/my-config.yaml
#    # 또는 MCPER_CONFIG_PATH (동일)
#
# 2) 환경별 병합 (리포 루트 기준)
#    - 먼저 config.yaml 로드
#    - MCPER_ENV 또는 APP_ENV 가 있으면 config.<env>.yaml 을 깊게 병합 (환경 파일이 우선)
#    예: cp config.example.yaml config.yaml
#        export MCPER_ENV=local
#        → config.yaml + config.local.yaml
#
# 문자열에 ${VAR} / ${VAR:-기본값} 를 쓸 수 있음(로드 후 os.environ 치환).
# 같은 키는 표준 환경변수가 YAML 보다 우선 (DATABASE_URL, PORT, EMBEDDING_PROVIDER, …).

server:
  host: "0.0.0.0"
  port: 8000

mcp:
  mount_path: "/mcp"

security:
  # MCP TransportSecurity allowed_origins (Host 는 MCP_ALLOWED_HOSTS·기동 시 DB 동기화)
  allowed_origins: []
  # 예: [ "http://203.0.113.7:8001" ]

database:
  # null 이면 DATABASE_URL env (없으면 앱 기본값)
  url: null
  # 예: url: "${DATABASE_URL}"

celery:
  broker_url: null
  result_backend: null
  # 예: broker_url: "${CELERY_BROKER_URL:-redis://redis:6379/0}"

# RAG/pgvector — embedding.dim 과 DB(pgvector)·인덱스가 일치해야 함
# provider: local | openai | localhost | bedrock
# env 로 덮어쓰기: EMBEDDING_PROVIDER, EMBEDDING_DIM, LOCAL_EMBEDDING_MODEL,
#   OPENAI_API_KEY, OPENAI_EMBEDDING_MODEL, OPENAI_BASE_URL,
#   LOCALHOST_EMBEDDING_BASE_URL, LOCALHOST_EMBEDDING_MODEL, LOCALHOST_EMBEDDING_API_KEY,
#   BEDROCK_REGION, BEDROCK_EMBEDDING_MODEL_ID
embedding:
  provider: local
  dim: 384
  local_model: "sentence-transformers/all-MiniLM-L6-v2"
  # openai_api_key: "${OPENAI_API_KEY}"
  # openai_model: "text-embedding-3-small"
  # openai_base_url: null
  # --- provider: localhost (OpenAI 호환 /v1/embeddings, 예: Ollama) ---
  # localhost_base_url: "http://127.0.0.1:11434/v1"
  # localhost_model: "nomic-embed-text"
  # localhost_api_key: null

  # --- provider: bedrock (예시 — 실제 전환 시 embedding 블록을 아래처럼 맞추고 dim/DB 정합 유지) ---
  # provider: bedrock
  # dim: 1024
  # bedrock_region: "ap-northeast-2"
  # bedrock_model_id: "amazon.titan-embed-text-v2:0"

# ── 인증 설정 (MCPER_AUTH_ENABLED=true 시 활성화) ─────────────────────────────
# 사내 배포 시 MCPER_AUTH_ENABLED=true 권장
# env 로 덮어쓰기: MCPER_AUTH_ENABLED, AUTH_SECRET_KEY, AUTH_TOKEN_EXPIRE_MINUTES,
#   AUTH_GOOGLE_CLIENT_ID, AUTH_GOOGLE_CLIENT_SECRET,
#   AUTH_GITHUB_CLIENT_ID, AUTH_GITHUB_CLIENT_SECRET
auth:
  enabled: false                    # true로 변경 시 JWT 인증 활성화
  secret_key: "${AUTH_SECRET_KEY}"  # 반드시 강력한 랜덤 값 설정 (32바이트 이상)
  token_expire_minutes: 1440        # 기본 24시간
  # Google OAuth (선택 — 설정 시 자동 활성화)
  # google_client_id: "${AUTH_GOOGLE_CLIENT_ID}"
  # google_client_secret: "${AUTH_GOOGLE_CLIENT_SECRET}"
  # GitHub OAuth (선택 — 설정 시 자동 활성화)
  # github_client_id: "${AUTH_GITHUB_CLIENT_ID}"
  # github_client_secret: "${AUTH_GITHUB_CLIENT_SECRET}"
